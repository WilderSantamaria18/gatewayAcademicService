spring.application.name=app-gateway
server.port=8080

# Eureka Client
eureka.client.enabled=false
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# --- AUTH SERVICE ---
spring.cloud.gateway.mvc.routes[0].id=auth-service
spring.cloud.gateway.mvc.routes[0].uri=http://localhost:8081
spring.cloud.gateway.mvc.routes[0].predicates[0]=Path=/auth-service/**
spring.cloud.gateway.mvc.routes[0].filters[0]=StripPrefix=1

# --- ACADEMIC SERVICE ---
spring.cloud.gateway.mvc.routes[1].id=academic-service
spring.cloud.gateway.mvc.routes[1].uri=http://localhost:8082
spring.cloud.gateway.mvc.routes[1].predicates[0]=Path=/academic-service/**
spring.cloud.gateway.mvc.routes[1].filters[0]=StripPrefix=1

# --- TASK SERVICE ---
spring.cloud.gateway.mvc.routes[2].id=task-service
spring.cloud.gateway.mvc.routes[2].uri=http://localhost:8083
spring.cloud.gateway.mvc.routes[2].predicates[0]=Path=/task-service/**
spring.cloud.gateway.mvc.routes[2].filters[0]=StripPrefix=1

# --- FINANCE SERVICE ---
spring.cloud.gateway.mvc.routes[3].id=finance-service
spring.cloud.gateway.mvc.routes[3].uri=http://localhost:8084
spring.cloud.gateway.mvc.routes[3].predicates[0]=Path=/finance-service/**
spring.cloud.gateway.mvc.routes[3].filters[0]=StripPrefix=1

