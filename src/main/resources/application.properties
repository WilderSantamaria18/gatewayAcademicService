spring.application.name=app-gateway
server.port=8080

# Eureka Client
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# Spring Cloud Gateway Routes (WebMVC) - Sintaxis correcta para versión 2025.1.1
# Public routes (Login/Register)
spring.cloud.gateway.mvc.routes[0].id=auth-service
spring.cloud.gateway.mvc.routes[0].uri=http://localhost:8081
spring.cloud.gateway.mvc.routes[0].predicates[0]=Path=/api/auth/**
spring.cloud.gateway.mvc.routes[0].filters[0]=StripPrefix=0

# Proxy route for all API calls (including /api/usuarios)
spring.cloud.gateway.mvc.routes[1].id=auth-service-api
spring.cloud.gateway.mvc.routes[1].uri=http://localhost:8081
spring.cloud.gateway.mvc.routes[1].predicates[0]=Path=/api/**
spring.cloud.gateway.mvc.routes[1].filters[0]=StripPrefix=0

# JWT Validation (Must match auth_service secret)
jwt.secret=mi-clave-super-secreta-proyecto-final-123456789-idat-2026