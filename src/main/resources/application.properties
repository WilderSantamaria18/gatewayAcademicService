spring.application.name=app-gateway
server.port=8080

# Eureka Client
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# Spring Cloud Gateway Routes (WebMVC) - Sintaxis correcta para versión 2025.1.1
# --- AUTH SERVICE ---
spring.cloud.gateway.mvc.routes[0].id=auth-service-exact
spring.cloud.gateway.mvc.routes[0].uri=http://localhost:8081
spring.cloud.gateway.mvc.routes[0].predicates[0]=Path=/api/auth

spring.cloud.gateway.mvc.routes[1].id=auth-service-sub
spring.cloud.gateway.mvc.routes[1].uri=http://localhost:8081
spring.cloud.gateway.mvc.routes[1].predicates[0]=Path=/api/auth/**

# --- TASK SERVICE ---
spring.cloud.gateway.mvc.routes[2].id=task-service-exact
spring.cloud.gateway.mvc.routes[2].uri=http://localhost:8083
spring.cloud.gateway.mvc.routes[2].predicates[0]=Path=/api/tareas

spring.cloud.gateway.mvc.routes[3].id=task-service-sub
spring.cloud.gateway.mvc.routes[3].uri=http://localhost:8083
spring.cloud.gateway.mvc.routes[3].predicates[0]=Path=/api/tareas/**

# --- USUARIOS (Admin Only) ---
spring.cloud.gateway.mvc.routes[4].id=usuarios-service-exact
spring.cloud.gateway.mvc.routes[4].uri=http://localhost:8081
spring.cloud.gateway.mvc.routes[4].predicates[0]=Path=/api/usuarios

spring.cloud.gateway.mvc.routes[5].id=usuarios-service-sub
spring.cloud.gateway.mvc.routes[5].uri=http://localhost:8081
spring.cloud.gateway.mvc.routes[5].predicates[0]=Path=/api/usuarios/**

# JWT Validation (Must match auth_service secret)
jwt.secret=mi-clave-super-secreta-proyecto-final-123456789-idat-2026